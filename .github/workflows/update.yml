name: aggiorna-affitti

on:
  schedule:
    # 05:00 UTC ≈ 07:00 in Italia (ora legale). D'inverno cade alle 06:00.
    - cron: "0 5 * * *"
  workflow_dispatch:        # bottone "Run workflow" per lanciarlo a mano

permissions:
  contents: write           # serve per committare lo storico

concurrency:
  group: aggiorna-affitti
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 lxml
      - name: Cerca annunci e aggiorna lo storico
        run: python scrape.py
      - name: Committa lo storico del giorno
        run: |
          git add -A history/
          if ! git diff --cached --quiet; then
            git config user.name  "affitti-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "annunci $(date -u +%F)"
            git push
          else
            echo "Nessuna modifica."
          fi
